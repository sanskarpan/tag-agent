# TAG LLM Pricing Table
# ---------------------
# Fields per entry:
#   model_id               — exact API model string used in requests
#   input_usd_per_1m       — cost in USD per 1,000,000 input tokens
#   output_usd_per_1m      — cost in USD per 1,000,000 output tokens
#   cache_read_multiplier  — fraction of input price charged for cached reads
#                            (optional; default 0.1, i.e. 10 % of input price)
#   batch_multiplier       — fraction of standard price charged for batch API
#                            (optional; default 0.5, i.e. 50 % of standard price)
#
# Prices are USD and reflect publicly listed rates as of 2026-06.
# Update this file whenever a provider revises its pricing.
# ---------------------

models:

  # ── Anthropic Claude ────────────────────────────────────────────────────────

  # Claude Sonnet 4.6 — balanced speed / intelligence, 1 M context
  - model_id: claude-sonnet-4-6
    input_usd_per_1m: 3.00
    output_usd_per_1m: 15.00
    cache_read_multiplier: 0.1

  # Claude Opus 4.8 — most capable Opus-tier model, 1 M context
  - model_id: claude-opus-4-8
    input_usd_per_1m: 15.00
    output_usd_per_1m: 75.00
    cache_read_multiplier: 0.1

  # Claude Haiku 4.5 — fastest / most cost-effective, 200 K context
  - model_id: claude-haiku-4-5
    input_usd_per_1m: 0.80
    output_usd_per_1m: 4.00
    cache_read_multiplier: 0.1
    batch_multiplier: 0.5

  # Claude Haiku 4.5 dated snapshot
  - model_id: claude-haiku-4-5-20251001
    input_usd_per_1m: 0.80
    output_usd_per_1m: 4.00
    cache_read_multiplier: 0.1
    batch_multiplier: 0.5

  # Claude Sonnet 4.5 — previous-generation balanced model
  - model_id: claude-sonnet-4-5
    input_usd_per_1m: 3.00
    output_usd_per_1m: 15.00
    cache_read_multiplier: 0.1

  # Claude 3.5 Sonnet (2024-10-22 snapshot) — widely used snapshot
  - model_id: claude-3-5-sonnet-20241022
    input_usd_per_1m: 3.00
    output_usd_per_1m: 15.00
    cache_read_multiplier: 0.1

  # Claude 3.5 Haiku (2024-10-22 snapshot)
  - model_id: claude-3-5-haiku-20241022
    input_usd_per_1m: 0.80
    output_usd_per_1m: 4.00
    cache_read_multiplier: 0.1

  # Claude 3 Opus (2024-02-29 snapshot) — retired but kept for legacy cost tracking
  - model_id: claude-3-opus-20240229
    input_usd_per_1m: 15.00
    output_usd_per_1m: 75.00
    cache_read_multiplier: 0.1

  # Anthropic via OpenRouter / proxy prefix
  - model_id: anthropic/claude-3-haiku
    input_usd_per_1m: 0.25
    output_usd_per_1m: 1.25
    cache_read_multiplier: 0.1

  # ── OpenAI GPT ──────────────────────────────────────────────────────────────

  # GPT-4o — latest multimodal flagship
  - model_id: gpt-4o
    input_usd_per_1m: 2.50
    output_usd_per_1m: 10.00

  # GPT-4o mini — cost-efficient small model
  - model_id: gpt-4o-mini
    input_usd_per_1m: 0.15
    output_usd_per_1m: 0.60

  # GPT-4 Turbo — high-capability GPT-4 variant with large context
