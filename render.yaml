# One-push deploy of the TAG OpenAI-compatible gateway to Render (render.com).
# Render auto-detects render.yaml at the repo root; it builds tag-go/Dockerfile
# with tag-go/ as the build context and runs `tag gateway` on $PORT.
services:
  - type: web
    name: tag-gateway
    runtime: docker
    dockerfilePath: ./tag-go/Dockerfile
    dockerContext: ./tag-go
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8787"
      - key: TAG_PROVIDER
        value: openai
      - key: TAG_GATEWAY_KEY
        generateValue: true   # a random bearer token clients must present
      - key: OPENAI_API_KEY
        sync: false           # set in the Render dashboard (secret)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
