<svg viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes and TAG responsibility split</title>
  <desc id="desc">A clean side-by-side comparison of Hermes runtime responsibilities and TAG control-plane responsibilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="1" stop-color="#eef7f0"/>
    </linearGradient>
    <style>
      .serif{font-family:Georgia,serif}
      .sans{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .ink{fill:#14231f}
      .muted{fill:#63756c}
      .panel{stroke:#d8cfbf;stroke-width:1.4}
    </style>
  </defs>
  <rect width="1400" height="760" rx="34" fill="url(#bg)"/>
  <text x="72" y="82" class="serif ink" font-size="36" font-weight="700">Wrapper at the runtime seam, product at the control-plane seam</text>
  <text x="72" y="120" class="sans muted" font-size="18">Hermes stayed the engine. TAG owned the operating concerns around it.</text>

  <rect x="86" y="184" width="552" height="430" rx="30" fill="#123b35"/>
  <text x="362" y="244" fill="#fff8ec" class="serif" font-size="34" font-weight="700" text-anchor="middle">Hermes runtime</text>
  <text x="362" y="276" fill="#cbdad4" class="sans" font-size="15" text-anchor="middle">what TAG deliberately reused</text>
  <g class="sans" font-size="16" fill="#fff8ec">
    <text x="140" y="340">Profiles and isolated runtime homes</text>
    <text x="140" y="392">Provider plugins and model calls</text>
    <text x="140" y="444">Delegation, child agents, streams</text>
    <text x="140" y="496">Kanban and gateway substrate</text>
    <text x="140" y="548">MCP, skills, tools, sessions, TUI</text>
  </g>

  <rect x="762" y="184" width="552" height="430" rx="30" fill="#fffdf8" class="panel"/>
  <text x="1038" y="244" class="serif ink" font-size="34" font-weight="700" text-anchor="middle">TAG control plane</text>
  <text x="1038" y="276" class="sans muted" font-size="15" text-anchor="middle">what TAG added around the engine</text>
  <g class="sans" font-size="16">
    <text x="816" y="340" class="ink">Routing policy, model assignment, fallbacks</text>
    <text x="816" y="392" class="ink">SQLite state for runs, queues, memory</text>
    <text x="816" y="444" class="ink">Budgets, evals, traces, replay, alerts</text>
    <text x="816" y="496" class="ink">Cron, webhooks, CI, PR workflows</text>
    <text x="816" y="548" class="ink">Bootstrap, doctor, packaging, hardening</text>
  </g>

  <rect x="662" y="344" width="76" height="112" rx="22" fill="#dff0e7" stroke="#aac5ba"/>
  <text x="700" y="388" class="mono muted" font-size="12" text-anchor="middle">managed</text>
  <text x="700" y="408" class="mono muted" font-size="12" text-anchor="middle">runtime</text>
  <text x="700" y="428" class="mono muted" font-size="12" text-anchor="middle">seam</text>
</svg>
