name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python build and test tools
        run: python -m pip install --upgrade pip build pytest

      - name: Install TAG in editable mode
        run: python -m pip install -e .[dev]
        working-directory: tag

      - name: Run TAG tests
        run: pytest -q tests/test_controller.py
        working-directory: tag

      - name: Build Python distributions
        run: python -m build
        working-directory: tag

      - name: Pack npm distribution
        run: npm pack
        working-directory: tag

      - name: Smoke-test Python CLI version
        run: python -m tag --version
        working-directory: tag

      - name: Smoke-test npm launcher version
        run: node bin/tag.js --version
        working-directory: tag
