name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python build and test tools
        run: python -m pip install --upgrade pip build pytest pytest-timeout

      - name: Install TAG in editable mode
        run: python -m pip install -e .[dev]

      - name: Run TAG tests
        run: PYTHONPATH=src pytest -q --ignore=tests/hermes_cli

      - name: Build Python distributions
        run: python -m build

      - name: Pack npm distribution
        run: npm pack

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-dist
          path: "*.tgz"

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-dist
          path: dist

      - name: Publish to npm
        run: |
          TARBALL=$(ls ./dist/*.tgz | head -1)
          npm publish "$TARBALL" --access public 2>&1 | tee /tmp/npm-out.txt; STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ] && grep -qi "previously published\|already exists\|cannot publish over" /tmp/npm-out.txt; then
            echo "Version already published on npm — skipping."
          else
            exit $STATUS
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

